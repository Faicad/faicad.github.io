name: Deploy CN version

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: node build.js
      - uses: peaceiris/actions-gh-pages@v3
        with:
          deploy_key: ${{ secrets.CN_DEPLOY_KEY }}
          external_repository: Faicad/faicad.cn
          publish_dir: dist/cn
          publish_branch: master
